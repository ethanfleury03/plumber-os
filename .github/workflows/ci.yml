name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: "1"
      # Clerk is required at build time; provide placeholder values so
      # `next build` can resolve the middleware without a real account.
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci-placeholder
      CLERK_SECRET_KEY: sk_test_ci-placeholder
      CLERK_WEBHOOK_SIGNING_SECRET: whsec_ci_placeholder
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Drizzle schema check
        run: npx drizzle-kit check || echo "drizzle check not fatal yet"

      - name: Build
        run: npm run build

  marketing-quality:
    name: Marketing Lighthouse and links
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: verify
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci-placeholder
      CLERK_SECRET_KEY: sk_test_ci-placeholder
      CLERK_WEBHOOK_SIGNING_SECRET: whsec_ci_placeholder
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_ci_placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3003
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start app
        run: npm run start > /tmp/next.log 2>&1 &

      - name: Wait for app
        run: |
          for i in {1..45}; do
            if curl -sf http://localhost:3003/ > /dev/null; then
              echo "App ready"
              exit 0
            fi
            sleep 2
          done
          echo "App did not start in time"
          cat /tmp/next.log
          exit 1

      - name: Broken link crawl
        run: node scripts/check-marketing-links.mjs

      - name: Lighthouse CI
        run: npx lhci autorun --config=.lighthouserc.json
